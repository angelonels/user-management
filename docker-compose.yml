services:
  mysql:
    image: mysql:8.0
    container_name: user_registry_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: user_registry
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "app_user",
          "-papp_password"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

